name: cobain
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.0
  file_picker: ^8.0.0
  provider: ^6.0.5
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.20.1

  # Notifikasi lokal (reminder checkout & auto-checkout)
  flutter_local_notifications: ^18.0.1
  # Timezone support untuk schedule notifikasi di waktu tertentu
  timezone: ^0.9.4

  # Firebase — push notification dari backend (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
